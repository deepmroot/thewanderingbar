<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; }
  .logo-wrap { display: flex; flex-direction: column; align-items: center; padding: 40px; }

  /* Version 1 — Black on White */
  .v1 .main { font-family: 'Great Vibes', cursive; font-size: 96px; color: #1a1a1a; line-height: 1; letter-spacing: 2px; }
  .v1 .sub { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 6px; text-transform: uppercase; color: #1a1a1a; margin-top: 8px; font-weight: 300; }

  /* Version 2 — Brand colors */
  .v2 { background: #FAF4ED; padding: 40px 60px; }
  .v2 .main { font-family: 'Great Vibes', cursive; font-size: 96px; color: #3B2A22; line-height: 1; letter-spacing: 2px; }
  .v2 .sub { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 6px; text-transform: uppercase; color: #C48B5A; margin-top: 8px; font-weight: 300; }

  /* Version 3 — Dark bg */
  .v3 { background: #3B2A22; padding: 40px 60px; }
  .v3 .main { font-family: 'Great Vibes', cursive; font-size: 96px; color: #E8D8C3; line-height: 1; letter-spacing: 2px; }
  .v3 .sub { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 6px; text-transform: uppercase; color: #C48B5A; margin-top: 8px; font-weight: 300; }

  .label { font-family: sans-serif; font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  hr { width: 100%; border: none; border-top: 1px solid #eee; }
</style>
</head>
<body>

<div class="label">Version 1 — Black on White</div>
<div class="logo-wrap v1">
  <div class="main">The Wandering Bar</div>
  <div class="sub">Mobile Bartending Service</div>
</div>

<hr>

<div class="label">Version 2 — Brand Colors (Warm)</div>
<div class="logo-wrap v2">
  <div class="main">The Wandering Bar</div>
  <div class="sub">Mobile Bartending Service</div>
</div>

<hr>

<div class="label">Version 3 — Dark (for light backgrounds / overlay)</div>
<div class="logo-wrap v3">
  <div class="main">The Wandering Bar</div>
  <div class="sub">Mobile Bartending Service</div>
</div>

</body>
</html>
